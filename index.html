*{box-sizing:border-box;margin:0;padding:0}

label{font-size:11px;color:var(--sub);display:block;margin-bottom:4px}

#go:disabled{background:var(--line);color:var(--sub);box-shadow:none}
.row{display:flex;gap:12px;margin-top:12px}
.row>div:first-child{flex:1}
#wk{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:var(--bg);border:1px solid var(--amber);color:var(--amber);border-radius:999px;
  padding:5px 12px;font-size:13px}
.msg{font-size:11px;color:var(--amber);margin-top:8px}
.ctx{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--sub);margin-bottom:8px}
.badge{padding:2px 6px;border-radius:4px;font-size:10px}
.best{background:var(--panel);border:1.5px solid var(--amber);border-radius:12px;padding:16px;
  box-shadow:0 0 24px rgba(245,179,1,.12);margin-bottom:12px}
.bl{font-size:11px;color:var(--amber)}
.bt{font-size:18px;font-weight:700;margin:2px 0 10px}
.steps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.st{font-size:11px;padding:5px 8px;border-radius:5px;background:var(--bg);border:1px solid var(--line)}
.nums{display:flex;gap:20px;align-items:flex-end}
.nl{font-size:10px;color:var(--sub)}
.nv{font-size:24px;font-weight:700}
.nv small{font-size:13px}
.warn{font-size:11px;color:var(--warn);margin-top:8px}
.info{font-size:11px;color:var(--sub);margin-top:8px}
.alts{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.alt{display:flex;align-items:center;gap:12px;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 16px}
.alt:last-child{border-bottom:none}
.alt.na{opacity:.45}
.al{flex:1;min-width:0;font-size:13px;font-weight:500}
.al .sm{font-size:10px;color:var(--sub);font-weight:400}

.ar{text-align:right;font-size:13px}
.ar .sm{font-size:10px;color:var(--sub)}
.ft{font-size:10px;color:var(--sub);line-height:1.7;margin-top:16px}
.empty{background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:24px;
  text-align:center;font-size:13px;color:var(--sub);line-height:1.9}

  /* 湾岸2線（橋・運河迂回で|Δidx|モデルが過小になる駅） */
  "日の出":5.5, "芝浦ふ頭":6.0, "東京国際クルーズターミナル":3.5, "テレコムセンター":3.0, "青海":2.5,

const norm = (s)=> s.replace(/ヶ/g,"ケ").replace(/駅$/,"").trim();

/* 駅名 → [{line, idx}] の逆引きマップ（複数路線は統合） */
const STMAP = (()=>{
  const m = {};
  Object.entries(METRO).forEach(([line, L])=>{
    L.stations.forEach((st,idx)=>{
      const k = norm(st);
      (m[k] = m[k] || []).push({ line, idx });
    });
  });
  return m;
})();

const fareN = (km)=> Math.round((500 + Math.max(0, km-0.91)*472)/100)*100;
const fareD = (km)=> Math.round((500 + Math.max(0, km-1.10)*392)/100)*100;
const fareRail = (min)=> min<=6?180 : min<=15?210 : min<=25?260 : 320;
const tollOf = (km)=> km<7?0 : km<9?700 : km<12?900 : 1070;

function genStationZone(stName) {
  const entries = STMAP[norm(stName)];
  if (!entries) return null;
  const hubs = [];
  const kms = [];
  let transit = null;
  const push = (hd, line, railMin, note, last)=>{
    hubs.push({ hub:hd.name, line, railMin, railFare:fareRail(railMin), last: last||"23:55",
      taxi:{d:hd.d, n:hd.n}, note: note||null,
      lo: 5+railMin+4+hd.tLo, hi: 5+railMin+5+hd.tHi+2 });
  };
  entries.forEach(({line, idx})=>{
    const L = METRO[line];
    const N = L.stations.length;
    const D = (a,b)=> L.loop ? Math.min(Math.abs(a-b), N-Math.abs(a-b)) : Math.abs(a-b);
    const mps = L.minPerStop || 2.1;
    const coef = L.dirCoef || 0.7;
    const anchors = [];
    if (L.hub) anchors.push({ hd:HUBDEF[L.hub], idx:L.hubIdx });
    (L.extraHubs||[]).forEach(e=> anchors.push({ hd:HUBDEF[e.hub], idx:e.idx }));
    anchors.forEach(a=>{
      kms.push(a.hd.km + D(idx,a.idx)*coef);
      if (norm(stName) !== a.hd.name)
        push(a.hd, line, Math.max(2, Math.round(D(idx,a.idx)*mps)));
    });
    (L.transfers||[]).forEach(tr=>{
      const hd = HUBDEF[tr.hub];
      const seg1 = Math.max(2, Math.round(D(idx,tr.atIdx)*mps));
      kms.push(tr.atKm + D(idx,tr.atIdx)*coef);
      if (norm(stName) !== hd.name)
        push(hd, line, seg1+tr.addMin+tr.thenMin, tr.note, "23:50");
    });
    if (L.transit) {
      const t = L.transit;
      const seg1 = Math.round(D(idx,t.atIdx)*mps);
      if (t.atKm !== undefined) kms.push(t.atKm + D(idx,t.atIdx)*coef);
      // direct: 乗換なしで下車駅→徒歩。それ以外は下車後に乗換＋後続区間
      const lo = t.direct ? 5+seg1+(t.walkMin||4) : 5+seg1+6+t.thenMin+4;
      const fare = t.direct ? (seg1 ? fareRail(seg1)+t.addFare : 0)
                            : (seg1?fareRail(seg1):0)+t.addFare;
      const cand = { desc:t.desc, lo, hi:lo+8, fare, last:t.last, line:t.line };
      if (!transit || cand.lo < transit.lo) transit = cand;
    }
  });
  const seen = {};
  const dedup = hubs.sort((a,b)=>a.lo-b.lo).filter(h=>{
    if (seen[h.hub] !== undefined) return false;
    seen[h.hub] = 1; return true;
  }).slice(0,3);
  const km = OVERRIDE_KM[norm(stName)] ?? Math.min(...kms);
  const dLo = Math.round(4 + km*1.6);
  const z = {
    id:"st:"+norm(stName), name:stName+"駅", aliases:[], generated:true,
    direct:{ d:fareD(km), n:fareN(km), lo:dLo, hi:Math.round(dLo*1.35)+2, toll:tollOf(km) },
    hubs: dedup,
  };
  if (transit) z.transit = transit;
  return z;
}

const toMin = (s) => { const [h,m] = s.split(":").map(Number); return (h>=24?h-24+24:h)*60+m; };
const fmtYen = (v) => v.toLocaleString("ja-JP");

function buildOptions(zone, timeMin, weekend) {
  const h = Math.floor(timeMin/60);
  const night = h>=22 || h<5;
  const rush = !weekend && h>=17 && h<20;
  // 深夜0時台以降の比較用: 終電判定は当日24時基準スケールに正規化
  const depBase = h<5 ? timeMin+1440 : timeMin;
  const ACCESS = 5; // 駅アクセス目安

  const opts = [];

  // 直行タクシー
  {
    const base = night ? zone.direct.n : zone.direct.d;
    const fare = Math.round((rush ? base*1.1 : base)/100)*100;
    const taxi = fare; // 首都高は「下道指定」を既定とし表示のみ
    opts.push({
      id:"direct", kind:"taxi", label:"直行タクシー",
      steps:[{t:"taxi", txt:`🚕 直行 ${zone.direct.lo}–${rush?Math.round(zone.direct.hi*1.5):zone.direct.hi}分`}],
      taxi, total:taxi, lo:zone.direct.lo,
      hi: rush ? Math.round(zone.direct.hi*1.5) : zone.direct.hi,
      toll: zone.direct.toll,
      note: zone.direct.toll ? `首都高利用なら +${fmtYen(zone.direct.toll)}円` : null,
      available:true,
    });
  }

  // ハブ（鉄道＋タクシー）
  zone.hubs.forEach((hb,i)=>{
    const lastM = hb.last.startsWith("24") ? 1440 + Number(hb.last.split(":")[1]) : toMin(hb.last);
    const available = depBase + ACCESS <= lastM;
    const remain = lastM - (depBase + ACCESS);
    const base = night ? hb.taxi.n : hb.taxi.d;
    const fare = Math.round((rush ? base*1.05 : base)/100)*100;
    const hw = headwayOf(hb.line, h);
    const wExtra = Math.max(0, hw - 5);
    opts.push({
      id:"hub"+i, kind:"hub", label:`${hb.hub}ハブ`,
      steps:[
        {t:"rail", line:hb.line, txt:`${LINE[hb.line].n} ${hb.railMin}分`},
        {t:"hub", txt:hb.hub},
        {t:"taxi", txt:`🚕 ラストマイル`},
      ],
      taxi:fare, total:fare+hb.railFare,
      lo: hb.lo + Math.round(wExtra*0.3), hi: hb.hi + wExtra, headway: hw,
      available, remain: available && remain<=45 ? remain : null,
      note: hb.note || null, last: hb.last,
    });
  });

  // 公共交通のみ
  if (zone.transit) {
    const t = zone.transit;
    const lastM = t.last.startsWith("24") ? 1440 + Number(t.last.split(":")[1]) : toMin(t.last);
    const available = depBase + ACCESS <= lastM;
    const remain = lastM - (depBase + ACCESS);
    const hwT = headwayOf(t.line, h);
    const wT = Math.max(0, hwT - 5);
    opts.push({
      id:"transit", kind:"transit", label:"公共交通のみ",
      steps:[{t:"rail", line:t.line, txt:t.desc}],
      taxi:0, total:t.fare, lo:t.lo + Math.round(wT*0.3), hi:t.hi + wT, headway:hwT,
      available, remain: available && remain<=45 ? remain : null, last:t.last,
    });
  }

  return { opts, night, rush };
}

const CAP = 3000;

/* 路線×時間帯の運行間隔モデル（分）。分単位の時刻表はClaude Code版でAPI連携予定。
   待ち時間は基準5分間隔を内包済みのため、超過分のみ加算する。 */
function headwayOf(line, h) {
  const late = (h>=23 || h<1);
  if (line==="yamanote") return late ? 7 : 4;
  if (line==="yurikamome" || line==="rinkai") return late ? 10 : h>=22 ? 8 : 6;
  if (line==="oedo" || line==="oedoBranch") return late ? 9 : h>=22 ? 7 : 6;
  return late ? 10 : h>=22 ? 7 : 5;
}

function recommend(opts) {
  const avail = opts.filter(o=>o.available);
  const feasible = avail.filter(o=>o.taxi<=CAP);
  const pool = feasible.length ? feasible : avail;
  const sorted = [...pool].sort((a,b)=>{
    const ma=(a.lo+a.hi)/2, mb=(b.lo+b.hi)/2;
    if (Math.abs(ma-mb)<=5) return a.total-b.total;
    return ma-mb;
  });
  const best = sorted[0];
  // 代替案は上限超過・終電後も含め全選択肢を表示（利用可→時間順、不可は末尾）
  const others = opts.filter(o=>o!==best).sort((a,b)=>{
    if (a.available!==b.available) return a.available ? -1 : 1;
    return (a.lo+a.hi)-(b.lo+b.hi);
  });
  return { best, capOK: feasible.length>0, others };
}

function findMatches(qs){
  const s = norm(qs);
  if(!s) return [];
  const zoneHits = ZONES.filter(z =>
    z.name.includes(s) || z.aliases.some(a => norm(a).includes(s) || s.includes(norm(a)))
  ).map(z=>({id:z.id,label:z.name}));
  const covered = new Set(ZONES.flatMap(z=>z.aliases.map(norm)));
  const stHits = Object.keys(STMAP)
    .filter(st => (st.includes(s)||s.includes(st)) && !covered.has(st))
    .map(st=>({id:"st:"+st,label:st+"駅"}));
  return [...zoneHits,...stHits].slice(0,6);
}
function zoneOf(id){ return id.startsWith("st:") ? genStationZone(id.slice(3)) : ZONES.find(z=>z.id===id); }

function resolveNow(){

  const matches = findMatches(qs);
  if(matches.length===0){ aiResolve(qs); return; }
  const s = norm(qs);
  const exact = matches.find(m => m.id==="st:"+s ||
    (ZONES.find(z=>z.id===m.id)?.aliases||[]).some(a=>norm(a)===s));
  if(exact){ setZone(exact.id); return; }
  if(matches.length===1){ setZone(matches[0].id); return; }
  $("chips").className="chips";
  $("chips").innerHTML = '<p style="font-size:11px;color:var(--sub);width:100%">複数候補あり。どれ？</p>' +
    matches.map(m=>`<button class="chip" onclick="setZone('${m.id}')">${m.label}</button>`).join("");
}
window.setZone = (id)=>{ currentZone = zoneOf(id); $("chips").innerHTML=""; rerender(); };
$("go").onclick = resolveNow;
$("q").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.target.blur(); resolveNow(); } });
$("q").addEventListener("input", ()=>{ $("chips").innerHTML=""; });

async function aiResolve(qs){
  $("aimsg").className="msg"; $("aimsg").textContent="AI判定中…";
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:'東京の場所「'+qs+'」から徒歩で最も近い鉄道駅名を1つ答えよ（東京メトロ・都営地下鉄・JR・ゆりかもめ・りんかい線の正式駅名のみ）。不明なら "none"。JSONのみで回答: {"station":"駅名"}'}]})});
    const data = await res.json();
    const text = (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
    const st = norm(JSON.parse(text.replace(/```json|```/g,"").trim()).station||"");
    const cz = ZONES.find(z=>z.aliases.some(a=>norm(a)===st));
    if(cz){ $("aimsg").textContent='「'+qs+'」→ '+cz.name+' と判定'; setZone(cz.id); }
    else if(STMAP[st]){ $("aimsg").textContent='「'+qs+'」→ 最寄り '+st+'駅 と判定'; setZone("st:"+st); }
    else $("aimsg").textContent="該当駅を特定できず。駅名で再入力を。";
  }catch(e){
    $("aimsg").textContent="AI判定はClaude.ai上でのみ動作。250駅の辞書は使えるので駅名・地名で入力を。";
  }
}

function stepHtml(st){
  if(st.t==="rail") return '<span class="st" style="border-left:3px solid '+LINE[st.line].c+'">'+st.txt+'</span>';
  if(st.t==="hub") return '<span class="st" style="color:var(--amber)">'+st.txt+'</span>';
  return '<span class="st">'+st.txt+'</span>';
}

function rerender(){
  if(!currentZone) return;
  const zone = currentZone;
  const timeMin = toMin($("tm").value || "23:00");
  const {opts,night,rush} = buildOptions(zone,timeMin,weekend);
  const {best,capOK,others} = recommend(opts);
  let h = '<div class="ctx"><span>'+zone.name+' 発</span>';
  if(night) h+='<span class="badge" style="background:#2A1E3F;color:#C9A7F5">深夜割増 ×1.2</span>';
  if(rush) h+='<span class="badge" style="background:#3F2A1E;color:#F5C9A7">夕ラッシュ補正</span>';
  h+='</div>';
  h+='<div class="best"><div class="bl">▍最適解</div><div class="bt">'+best.label+'</div>';
  h+='<div class="steps">'+best.steps.map(stepHtml).join("")+'</div>';
  h+='<div class="nums mono">';
  h+='<div><div class="nl">所要</div><div class="nv">'+best.lo+'–'+best.hi+'<small>分</small></div></div>';
  h+='<div><div class="nl">総額</div><div class="nv">¥'+fmtYen(best.total)+'</div></div>';
  h+='<div><div class="nl">タクシー分</div><div style="font-size:17px;color:'+(best.taxi<=CAP?'var(--ok)':'var(--warn)')+'">¥'+fmtYen(best.taxi)+'</div></div></div>';
  if(best.taxi===CAP) h+='<p class="warn">⚠ 上限張り付き。乗車時「下道で」を指定</p>';
  if(best.remain) h+='<p class="warn">⏱ 終電まで約'+best.remain+'分（'+best.last+'発が最終目安）</p>';
  if(best.headway) h+='<p class="info">🚃 この時間帯の運行間隔 約'+best.headway+'分（待ち時間は所要に反映済み）</p>';
  if(best.note) h+='<p class="info">'+best.note+'</p>';
  if(!capOK) h+='<p class="warn">⚠ 全選択肢が上限¥3,000超過（終電後）。最安案を表示。</p>';
  h+='</div>';
  h+='<div class="alts">'+others.map(o=>
    '<div class="alt'+(o.available?'':' na')+'"><div class="al">'+o.label+
    (!o.available?'<span class="bad">終電終了</span>':(o.taxi>CAP?'<span class="bad">上限超過</span>':''))+
    (o.note?'<div class="sm">'+o.note+'</div>':'')+
    '</div><div class="ar mono">'+o.lo+'–'+o.hi+'分<div class="sm" style="color:'+(o.taxi<=CAP?'var(--sub)':'var(--warn)')+'">¥'+fmtYen(o.total)+'</div></div></div>'
  ).join("")+'</div>';
  h+='<p class="ft">設計値: door-to-door推定±3分（生成駅は±15%）。運賃は2026年7月現行（初乗¥500・深夜2割増）。終電・運行間隔は静的目安。首都高利用時は別途。最終確認は乗換案内アプリで。</p>';
  $("out").innerHTML = h;
}
</script>
